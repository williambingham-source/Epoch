# Full Epoch stack: Gitea + Excalidraw + Bridge + Ollama
# Usage:
#   .\start-epoch.ps1                          (uses .env for config)
#   .\start-epoch.ps1 -Down                    (stop everything)
#   .\start-epoch.ps1 -Build                   (force image rebuild)
#
# Required env vars (set in .env):
#   WORKSPACE_DIR      - absolute host path to the Epoch workspace to open
#
# Vision provider (set VISION_PROVIDER in .env):
#   ollama    - free, local, CPU-only on this machine (~30-90s per image)
#   anthropic - best quality, ~$0.02/image (needs ANTHROPIC_API_KEY)
#   openai    - good quality, similar cost  (needs OPENAI_API_KEY)
#   gemini    - cheapest cloud option       (needs GEMINI_API_KEY)

services:
  gitea:
    image: gitea/gitea:latest
    container_name: epoch-gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__ROOT_URL=http://localhost:3000/
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__log__MODE=console
    volumes:
      - ./gitea/data:/data
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  excalidraw:
    image: epoch-excalidraw:latest
    container_name: epoch-excalidraw
    build:
      context: ../Excalidraw
      args:
        - NODE_ENV=production
    ports:
      - "3001:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: epoch-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  epoch-collab:
    build:
      context: ./collab
    container_name: epoch-collab
    ports:
      - "3004:3004"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3004"]
      interval: 15s
      timeout: 5s
      retries: 5

  # epoch-bridge runs on the HOST (not in Docker) so it can reach cloud vision APIs.
  # Start it via start-epoch.ps1 which sets env vars and launches dist/bridge/server.js.

  epoch-web:
    image: epoch-web:latest
    container_name: epoch-web
    build:
      context: ./epoch-web
    ports:
      - "3003:3003"
    environment:
      # host.docker.internal reaches the locally-running bridge (Docker containers
      # have no outbound internet, so the bridge runs on the host instead).
      - BRIDGE_URL=http://host.docker.internal:3002
      # next-auth / Gitea OAuth
      - NEXTAUTH_URL=http://127.0.0.1:3003
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - GITEA_CLIENT_ID=${GITEA_CLIENT_ID}
      - GITEA_CLIENT_SECRET=${GITEA_CLIENT_SECRET}
      - GITEA_URL=${GITEA_URL:-http://localhost:3000}
      # Server-side URL for token exchange â€” epoch-web reaches Gitea via Docker network
      - GITEA_INTERNAL_URL=http://host.docker.internal:3000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3003"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  ollama-models:
